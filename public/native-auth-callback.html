<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CharmAI - Connexion...</title>
  <style>
    body {
      margin: 0;
      background: #0a0a14;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #e91e63;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <p>Connexion en cours...</p>
  </div>
  <script>
    const APP_SCHEME = "com.charmai.app";
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get("access_token");
    const refreshToken = params.get("refresh_token");

    if (accessToken && refreshToken) {
      // Redirect back to native app with tokens
      window.location.href = APP_SCHEME + "://auth#access_token=" + accessToken + "&refresh_token=" + refreshToken;
      // Fallback: if custom scheme doesn't work, redirect to web app
      setTimeout(function() {
        window.location.href = "/#access_token=" + accessToken + "&refresh_token=" + refreshToken;
      }, 3000);
    } else {
      // No tokens - redirect to home
      window.location.href = "/";
    }
  </script>
</body>
</html>
