name: Build Charm AI Total Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web Application
        run: |
          npm install
          npm run build

      - name: Setup Capacitor & Assets
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init "Charm AI" com.charmai.app --web-dir dist || echo "Ok"
          npx cap add android || echo "Ok"
          
          # Correction du logo : cherche n'importe quel logo et le place au bon endroit
          mkdir -p assets
          find . -maxdepth 2 -iname "logo*" -exec cp {} assets/icon.png \;
          npx capacitor-assets generate --android || echo "Assets skip"
          
          # IMPORTANT : Synchronise le JSON et les fichiers Web
          npx cap copy android
          npx cap sync android

      - name: Fix Android Environment
        run: |
          # Supprime les doublons Kotlin qui font échouer le build
          sed -i '/dependencies {/a \    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22")\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22")\n    }' android/app/build.gradle
          
          # Autorise le trafic HTTP en plus du HTTPS au cas où
          sed -i 's/android:fullBackupContent="true"/android:fullBackupContent="true" android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Final Compilation
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Functional APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Full-Fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
