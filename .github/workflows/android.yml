name: Build Charm AI Final Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web (Code de Lovable)
        run: |
          npm install
          npm run build

      - name: Initialisation Capacitor & Plugins
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          npx cap init "Charm AI" com.charmai.app --web-dir dist || echo "Ok"
          npx cap add android || echo "Ok"

      - name: Configuration Deep Links (Fix Lovable)
        run: |
          # Injection du code de redirection dans AndroidManifest.xml
          sed -i '/<intent-filter>/i \        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="com.charmai.app" android:host="auth" />\n        </intent-filter>' android/app/src/main/AndroidManifest.xml
          
          # Mise à jour de capacitor.config.json
          echo '{"appId":"com.charmai.app","appName":"Charm AI","webDir":"dist","server":{"androidScheme":"https","allowNavigation":["*.lovable.app","accounts.google.com"]}}' > capacitor.config.json
          
          npx cap sync android

      - name: Gestion du Logo
        run: |
          mkdir -p assets
          find . -maxdepth 1 -iname "logo*" -exec cp {} assets/icon.png \;
          npx @capacitor/assets generate --android || echo "Pas de logo"

      - name: 🛠️ FORCE ANDROID COMPATIBILITY (Le Fix)
        run: |
          # 1. On force la version du SDK à 35 (le max supporté actuellement par GitHub)
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/variables.gradle
          
          # 2. On bloque la version de Browser qui fait tout planter
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'androidx.browser' && details.requested.name == 'browser') {
                      details.useVersion '1.8.0'
                  }
              }
          }" >> android/build.gradle

      - name: Compilation de l'APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Téléchargement de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Success-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
