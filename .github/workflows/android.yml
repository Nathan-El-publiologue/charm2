name: Build Charm AI Final Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web (Production)
        run: |
          npm install
          npm run build

      - name: Init & Sync Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          # On s'assure que le projet est propre
          npx cap init "Charm AI" com.charmai.app --web-dir dist
          npx cap add android || echo "Déjà ajouté"
          npx cap sync android

      - name: 🛠️ CONFIGURATION FINALE (Logo + Google + No Bar)
        run: |
          # 1. LOGO : Génération des 74 fichiers pour la netteté
          npm install -g @capacitor/assets
          mkdir -p assets
          cp "logo. png" assets/icon.png || cp logo.png assets/icon.png
          capacitor-assets generate --android

          # 2. FIX GOOGLE (Comme demandé par Lovable)
          sed -i '/<intent-filter>/i \        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="com.charmai.app" android:host="auth" />\n        </intent-filter>' android/app/src/main/AndroidManifest.xml

          # 3. FIX VERSION API 35
          echo "allprojects { configurations.all { resolutionStrategy.force 'androidx.browser:browser:1.8.0' } }" >> android/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/variables.gradle

          npx cap sync android

      - name: Compilation APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Livraison APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Production
          path: android/app/build/outputs/apk/debug/app-debug.apk
