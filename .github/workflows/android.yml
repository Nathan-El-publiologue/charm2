name: Build Charm AI APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tools
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

      - name: Build Web
        run: npm run build

      - name: Setup Android Project
        run: |
          npx cap add android
          mkdir -p assets
          cp logo.png assets/icon.png
          npx capacitor-assets generate --android
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: Charm-AI-Mobile
          path: android/app/build/outputs/apk/debug/app-debug.apk
