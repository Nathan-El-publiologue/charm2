name: Build Charm AI Final Unstoppable
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          npm run build

      - name: Init Android Neuve
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          npx cap init "Charm AI" com.charmai.app --web-dir dist
          npx cap add android

      - name: 🛠️ INJECTION DU MANIFEST PARFAIT
        run: |
          # On crée le fichier Manifest exact que Lovable et Android demandent
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Charm AI"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.charmai.app.MainActivity"
                      android:label="Charm AI"
                      android:theme="@style/AppTheme.NoActionBarLauncher"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="com.charmai.app" android:host="auth" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 🛠️ FIX LOGO & GRADLE
        run: |
          # 1. Logo
          mkdir -p assets
          cp "logo. png" assets/icon.png || cp logo.png assets/icon.png
          npm install -g @capacitor/assets
          capacitor-assets generate --android || echo "Logo skip"

          # 2. Fix API 35 (Anti-erreur 36)
          echo "allprojects { configurations.all { resolutionStrategy.force 'androidx.browser:browser:1.8.0' } }" >> android/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/variables.gradle

          npx cap sync android

      - name: Compilation APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Livraison APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-SUCCESS
          path: android/app/build/outputs/apk/debug/app-debug.apk
