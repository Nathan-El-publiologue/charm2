name: Build Charm AI Lovable Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          npm run build

      - name: Create Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          npx cap init "Charm AI" com.charmai.app --web-dir dist
          npx cap add android

      - name: 🛠️ INJECTION DES INSTRUCTIONS LOVABLE
        run: |
          # 1. FIX GOOGLE (Ce qui est écrit en vert dans ta photo)
          # On insère EXACTEMENT le filtre d'intention demandé par Lovable
          sed -i '/<activity/a \        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="com.charmai.app" android:host="auth" />\n        </intent-filter>' android/app/src/main/AndroidManifest.xml

          # 2. FIX LOGO
          npm install -g @capacitor/assets
          mkdir -p assets
          cp "logo. png" assets/icon.png || cp logo.png assets/icon.png
          capacitor-assets generate --android

          # 3. FIX ERREUR GRADLE (API 35)
          echo "allprojects { configurations.all { resolutionStrategy.force 'androidx.browser:browser:1.8.0' } }" >> android/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/variables.gradle

          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Lovable-Fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
