name: Build Charm AI APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        run: |
          npm install
          npm run build
          npx cap init "Charm AI" com.charmai.app --web-dir dist
          npx cap add android
          mkdir -p assets
          cp logo.png assets/icon.png || echo "No logo found"
          npx capacitor-assets generate --android || echo "Assets skip"
          npx cap sync android
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Charm-AI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
