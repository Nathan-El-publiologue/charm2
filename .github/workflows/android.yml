name: Build Charm AI Final Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          npx cap init "Charm AI" com.charmai.app --web-dir dist || echo "Ok"
          npx cap add android || echo "Ok"

      - name: Injection Configuration Lovable
        run: |
          # Ajout du Deep Link pour Google Auth dans le Manifest
          sed -i '/<intent-filter>/i \        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="com.charmai.app" android:host="auth" />\n        </intent-filter>' android/app/src/main/AndroidManifest.xml
          
          # Configuration serveur pour éviter la 404
          echo '{"appId":"com.charmai.app","appName":"Charm AI","webDir":"dist","server":{"androidScheme":"https","allowNavigation":["*.lovable.app","accounts.google.com"]}}' > capacitor.config.json
          
          npx cap sync android

      - name: 🛠️ FORCE RESOLUTION (Brutal Fix)
        run: |
          # On force le SDK à 35
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/variables.gradle
          
          # On force Gradle à utiliser la version 1.8.0 pour TOUT le projet
          # C'est ici que le problème d'API 36 est réglé définitivement
          echo "subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.browser:browser:1.8.0'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }" >> android/build.gradle

      - name: Compilation APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
