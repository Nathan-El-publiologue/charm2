name: Build Charm AI Final Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          npm run build

      - name: Initialisation Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          npx cap init "Charm AI" com.charmai.app --web-dir dist
          npx cap add android

      - name: 🛠️ CONFIGURATION NATIVE (Logo + Google Fix)
        run: |
          # 1. FIX GOOGLE (Injection propre dans le Manifest)
          # On remplace la ligne de l'activité pour insérer le code Lovable juste après
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f: content = f.read()
          intent = '''
                  <intent-filter>
                      <action android:name=\"android.intent.action.VIEW\" />
                      <category android:name=\"android.intent.category.DEFAULT\" />
                      <category android:name=\"android.intent.category.BROWSABLE\" />
                      <data android:scheme=\"com.charmai.app\" android:host=\"auth\" />
                  </intent-filter>'''
          new_content = content.replace('<activity', intent + '\n        <activity')
          with open(path, 'w') as f: f.write(new_content)
          "

          # 2. FIX LOGO
          mkdir -p assets
          cp "logo. png" assets/icon.png || cp logo.png assets/icon.png
          npm install -g @capacitor/assets
          capacitor-assets generate --android || echo "Logo ignoré pour éviter l'échec"

          # 3. FIX VERSION API 35 (C'est ce qui a marché dans ton dernier log !)
          echo "allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.browser:browser:1.8.0'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }" >> android/build.gradle
          
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/variables.gradle

          npx cap sync android

      - name: Compilation APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Télécharger l'APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Final-Stable
          path: android/app/build/outputs/apk/debug/app-debug.apk
