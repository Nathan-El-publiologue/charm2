name: Build Charm AI APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configuration de Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation et Build Web
        run: |
          npm install
          npm run build

      - name: Preparation Capacitor et Logo
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init "Charm AI" com.charmai.app --web-dir dist || echo "Déjà init"
          npx cap add android || echo "Android existe déjà"
          
          # Force la détection du logo
          mkdir -p assets
          find . -maxdepth 2 -name "logo*" -exec cp {} assets/icon.png \;
          
          # GÉNÉRATION ET COPIE (C'est ici que l'erreur 404 se règle)
          npx capacitor-assets generate --android || echo "Pas d'assets"
          npx cap copy android
          npx cap sync android

      - name: Correctif Duplicate Classes (Kotlin)
        run: |
          sed -i '/dependencies {/a \    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") { because("Force same version to avoid duplicate classes") }\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") { because("Force same version to avoid duplicate classes") }\n    }' android/app/build.gradle

      - name: Compilation de l'APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Téléchargement de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: Charm-AI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
