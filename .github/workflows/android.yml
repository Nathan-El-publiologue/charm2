name: Build Charm AI APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configuration de Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Correction ici pour éviter l'erreur "invalid source release"

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation et Build Web
        run: |
          npm install
          npm run build

      - name: Preparation Capacitor et Logo
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init "Charm AI" com.charmai.app --web-dir dist || echo "Déjà init"
          npx cap add android || echo "Android existe déjà"
          
          # Force la détection du logo peu importe le nom ou l'emplacement
          mkdir -p assets
          find . -maxdepth 2 -name "logo*" -exec cp {} assets/icon.png \;
          
          npx capacitor-assets generate --android || echo "Pas d'assets générés"
          npx cap sync android

      - name: Compilation de l'APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Téléchargement de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: Charm-AI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
