name: Build Charm AI Total Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web (Code de Lovable)
        run: |
          npm install
          npm run build

      - name: Initialisation Capacitor & Plugins
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          npx cap init "Charm AI" com.charmai.app --web-dir dist || echo "Déjà fait"
          npx cap add android || echo "Déjà fait"

      - name: Configuration Deep Links (Le fix de Lovable)
        run: |
          # Cette commande ajoute automatiquement le code de redirection Google dans AndroidManifest.xml
          sed -i '/<intent-filter>/i \        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="com.charmai.app" android:host="auth" />\n        </intent-filter>' android/app/src/main/AndroidManifest.xml
          
          # Mise à jour de capacitor.config.json pour Lovable
          echo '{"appId":"com.charmai.app","appName":"Charm AI","webDir":"dist","server":{"androidScheme":"https","allowNavigation":["*.lovable.app","accounts.google.com"]}}' > capacitor.config.json
          
          npx cap sync android

      - name: Gestion du Logo
        run: |
          mkdir -p assets
          # On cherche le logo peu importe son nom (avec ou sans espace)
          find . -maxdepth 1 -iname "logo*" -exec cp {} assets/icon.png \;
          npx @capacitor/assets generate --android || echo "Pas de logo"

      - name: Correctif Doublons Kotlin
        run: |
          sed -i '/dependencies {/a \    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22")\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22")\n    }' android/app/build.gradle

      - name: Compilation de l'APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Téléchargement de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Final-Fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
