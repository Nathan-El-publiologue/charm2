name: Build Charm AI Final Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web
        run: |
          npm install
          npm run build

      - name: Capacitor Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
          npx cap sync android

      - name: 🛠️ FIX LOGO & GOOGLE (Zéro Erreur)
        run: |
          # 1. FIX DU LOGO : On force ton icône "logo. png"
          npm install -g @capacitor/assets
          mkdir -p assets
          cp "logo. png" assets/icon.png || cp logo.png assets/icon.png
          # On génère les icônes Android à partir de ton logo
          capacitor-assets generate --android

          # 2. FIX 404 GOOGLE : Injection du filtre d'intention Lovable
          # On l'insère précisément dans le Manifest pour que com.charmai.app://auth fonctionne
          sed -i '/<activity/a \        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="com.charmai.app" android:host="auth" />\n        </intent-filter>' android/app/src/main/AndroidManifest.xml

          # 3. FIX API 36 : On bloque la version de browser qui fait planter Gradle
          echo "allprojects { configurations.all { resolutionStrategy.force 'androidx.browser:browser:1.8.0' } }" >> android/build.gradle
          # On force le SDK 35 (compatible avec GitHub Actions)
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/variables.gradle
          sed -i 's/targetSdk = .*/targetSdk = 35/' android/variables.gradle

      - name: Compilation APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Livraison APK
        uses: actions/upload-artifact@v4
        with:
          name: CharmAI-Final-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
